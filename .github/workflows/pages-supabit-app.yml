name: Deploy supabit.app (Workers)
on:
  push:
    branches:
      - main
    paths:
      - apps/supabit.app/**
      - packages/ui/**
      - packages/typescript-config/**
      - bun.lock
      - package.json
      - turbo.json
      - .github/workflows/pages-supabit-app.yml
  pull_request:
    branches:
      - main
    paths:
      - apps/supabit.app/**
      - packages/ui/**
      - packages/typescript-config/**
      - bun.lock
      - package.json
      - turbo.json
      - .github/workflows/pages-supabit-app.yml
concurrency:
  group: pages-supabit-app-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2
      - uses: actions/cache@v4
        name: Cache bun
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - uses: actions/cache@v4
        name: Cache turbo
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: bun install --frozen-lockfile
      - run: bun run deploy
        working-directory: apps/supabit.app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
