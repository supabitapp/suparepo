name: supaimg-release
on:
  push:
    tags: ["supaimg/v*.*.*"]

jobs:
  build-macos:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true
      - name: Check version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#supaimg/v}"
          if [ "$VERSION" = "$TAG" ]; then
            echo "::error::Tag must be prefixed with 'supaimg/v'"
            exit 1
          fi
          APP_VERSION=$(jq -r '.version' apps/supaimg-desktop/src-tauri/tauri.conf.json)
          if [ "$APP_VERSION" != "$VERSION" ]; then
            echo "::error::Version mismatch: tauri.conf.json has '$APP_VERSION' but tag is '$TAG'"
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7
        with:
          targets: aarch64-apple-darwin
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
      - run: brew install nasm pkg-config
      - run: bun install

      - name: Ensure release draft
        env:
          GH_TOKEN: ${{ secrets.SUPAIMG_RELEASE_TOKEN }}
          SUPAIMG_RELEASE_REPO: supabitapp/supaimg
        run: |
          TAG="${{ github.ref_name }}"
          if ! gh release view "$TAG" --repo "$SUPAIMG_RELEASE_REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes --draft --repo "$SUPAIMG_RELEASE_REPO"
          fi

      - name: Build app
        env:
          TAURI_BUNDLER_DMG_IGNORE_CI: "false"
          APPLE_CERTIFICATE: ${{ secrets.SUPAIMG_APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.SUPAIMG_APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.SUPAIMG_APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.SUPAIMG_TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.SUPAIMG_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd apps/supaimg-desktop
          bun run tauri build --target aarch64-apple-darwin

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for dmg in apps/supaimg-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            xcrun notarytool submit "$dmg" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple "$dmg"
          done

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.SUPAIMG_RELEASE_TOKEN }}
          SUPAIMG_RELEASE_REPO: supabitapp/supaimg
        run: |
          TAG="${{ github.ref_name }}"
          ASSET_DIR="/tmp/supaimg-release-assets"
          mkdir -p "$ASSET_DIR"
          TAR="apps/supaimg-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/SupaIMG.app.tar.gz"
          DMG=$(ls apps/supaimg-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg | head -1)

          cp "$TAR" "$ASSET_DIR/supaimg_aarch64.app.tar.gz"
          cp "${TAR}.sig" "$ASSET_DIR/supaimg_aarch64.app.tar.gz.sig"
          cp "$DMG" "$ASSET_DIR/supaimg_aarch64.dmg"

          gh release upload "$TAG" "$ASSET_DIR/supaimg_aarch64.app.tar.gz" --repo "$SUPAIMG_RELEASE_REPO" --clobber
          gh release upload "$TAG" "$ASSET_DIR/supaimg_aarch64.app.tar.gz.sig" --repo "$SUPAIMG_RELEASE_REPO" --clobber
          gh release upload "$TAG" "$ASSET_DIR/supaimg_aarch64.dmg" --repo "$SUPAIMG_RELEASE_REPO" --clobber

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true
      - name: Check version matches tag
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          if ($TAG -notmatch '^supaimg/v') { Write-Error "Tag must be prefixed with 'supaimg/v'"; exit 1 }
          $VERSION = $TAG -replace '^supaimg/v',''
          $APP_VERSION = (Get-Content apps/supaimg-desktop/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          if ($APP_VERSION -ne $VERSION) { Write-Error "Version mismatch"; exit 1 }
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7
        with:
          targets: x86_64-pc-windows-msvc
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
      - run: bun install

      - name: Ensure release draft
        env:
          GH_TOKEN: ${{ secrets.SUPAIMG_RELEASE_TOKEN }}
          SUPAIMG_RELEASE_REPO: supabitapp/supaimg
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $exists = gh release view $TAG --repo $env:SUPAIMG_RELEASE_REPO 2>&1
          if ($LASTEXITCODE -ne 0) { gh release create $TAG --title $TAG --draft --repo $env:SUPAIMG_RELEASE_REPO }

      - name: Build app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.SUPAIMG_TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.SUPAIMG_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd apps/supaimg-desktop
          bun run tauri build --target x86_64-pc-windows-msvc --bundles msi,nsis

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.SUPAIMG_RELEASE_TOKEN }}
          SUPAIMG_RELEASE_REPO: supabitapp/supaimg
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $AssetDir = Join-Path $env:RUNNER_TEMP "supaimg-release-assets"
          New-Item -ItemType Directory -Force -Path $AssetDir | Out-Null
          $NSIS = Get-ChildItem "apps/supaimg-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" | Select-Object -First 1
          $MSI = Get-ChildItem "apps/supaimg-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi" | Select-Object -First 1

          Copy-Item $NSIS.FullName (Join-Path $AssetDir "supaimg_x64-setup.exe")
          Copy-Item "$($NSIS.FullName).sig" (Join-Path $AssetDir "supaimg_x64-setup.exe.sig")
          Copy-Item $MSI.FullName (Join-Path $AssetDir "supaimg_x64.msi")

          gh release upload $TAG (Join-Path $AssetDir "supaimg_x64-setup.exe") --repo $env:SUPAIMG_RELEASE_REPO --clobber
          gh release upload $TAG (Join-Path $AssetDir "supaimg_x64-setup.exe.sig") --repo $env:SUPAIMG_RELEASE_REPO --clobber
          gh release upload $TAG (Join-Path $AssetDir "supaimg_x64.msi") --repo $env:SUPAIMG_RELEASE_REPO --clobber

  publish-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true

      - name: Generate combined update.json
        env:
          GH_TOKEN: ${{ secrets.SUPAIMG_RELEASE_TOKEN }}
          SUPAIMG_RELEASE_REPO: supabitapp/supaimg
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#supaimg/v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SIG_DIR="/tmp/supaimg-release-sigs"
          mkdir -p "$SIG_DIR"
          gh release download "$TAG" --repo "$SUPAIMG_RELEASE_REPO" \
            --pattern "supaimg_aarch64.app.tar.gz.sig" \
            --pattern "supaimg_x64-setup.exe.sig" \
            --dir "$SIG_DIR"
          MACOS_SIG=$(cat "$SIG_DIR/supaimg_aarch64.app.tar.gz.sig")
          WINDOWS_SIG=$(cat "$SIG_DIR/supaimg_x64-setup.exe.sig")

          cat > update.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Release ${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MACOS_SIG}",
                "url": "https://supaimg.app/appcast/${TAG}/supaimg_aarch64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "https://supaimg.app/appcast/${TAG}/supaimg_x64-setup.exe"
              }
            }
          }
          EOF
          gh release upload "$TAG" update.json --repo "$SUPAIMG_RELEASE_REPO" --clobber

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.SUPAIMG_RELEASE_TOKEN }}
          SUPAIMG_RELEASE_REPO: supabitapp/supaimg
        run: gh release edit ${{ github.ref_name }} --draft=false --repo $SUPAIMG_RELEASE_REPO
