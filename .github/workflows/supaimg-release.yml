name: supaimg-release
on:
  push:
    tags: ["*.*.*"]

jobs:
  build-macos:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true
      - name: Check version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION=$(jq -r '.version' apps/supaimg-desktop/src-tauri/tauri.conf.json)
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::Version mismatch: tauri.conf.json has '$VERSION' but tag is '$TAG'"
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7
        with:
          targets: aarch64-apple-darwin
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
      - run: brew install nasm pkg-config awscli
      - run: bun install

      - name: Ensure release draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes --draft
          fi

      - name: Build app
        env:
          TAURI_BUNDLER_DMG_IGNORE_CI: "false"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd apps/supaimg-desktop
          bun run tauri build --target aarch64-apple-darwin

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for dmg in apps/supaimg-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            xcrun notarytool submit "$dmg" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple "$dmg"
          done

      - name: Upload artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          for asset in apps/supaimg-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz*; do
            gh release upload "$TAG" "$asset" --clobber
          done
          for dmg in apps/supaimg-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            gh release upload "$TAG" "$dmg" --clobber
          done

      - name: Upload artifacts to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          VERSION="${{ github.ref_name }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
          aws configure set region auto

          TAR="apps/supaimg-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/SupaIMG.app.tar.gz"
          DMG=$(ls apps/supaimg-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          SIG=$(cat "${TAR}.sig")

          aws s3 cp "$TAR" "s3://${R2_BUCKET}/supaimg/${VERSION}/supaimg_aarch64.app.tar.gz" --endpoint-url "$R2_ENDPOINT"
          aws s3 cp "${TAR}.sig" "s3://${R2_BUCKET}/supaimg/${VERSION}/supaimg_aarch64.app.tar.gz.sig" --endpoint-url "$R2_ENDPOINT"
          aws s3 cp "$DMG" "s3://${R2_BUCKET}/supaimg/${VERSION}/supaimg_aarch64.dmg" --endpoint-url "$R2_ENDPOINT"
          aws s3 cp "$TAR" "s3://${R2_BUCKET}/supaimg/supaimg_aarch64_latest.app.tar.gz" --endpoint-url "$R2_ENDPOINT"
          aws s3 cp "${TAR}.sig" "s3://${R2_BUCKET}/supaimg/supaimg_aarch64_latest.app.tar.gz.sig" --endpoint-url "$R2_ENDPOINT"

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true
      - name: Check version matches tag
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $VERSION = (Get-Content apps/supaimg-desktop/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          if ($VERSION -ne $TAG) { Write-Error "Version mismatch"; exit 1 }
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7
        with:
          targets: x86_64-pc-windows-msvc
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
      - run: bun install

      - name: Ensure release draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $exists = gh release view $TAG 2>&1
          if ($LASTEXITCODE -ne 0) { gh release create $TAG --title $TAG --draft }

      - name: Build app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd apps/supaimg-desktop
          bun run tauri build --target x86_64-pc-windows-msvc --bundles msi,nsis

      - name: Upload artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          Get-ChildItem "apps/supaimg-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi" | ForEach-Object { gh release upload $TAG $_.FullName --clobber }
          Get-ChildItem "apps/supaimg-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" | ForEach-Object { gh release upload $TAG $_.FullName --clobber }

      - name: Upload to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $R2_ENDPOINT = "https://$env:R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          aws configure set aws_access_key_id $env:R2_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $env:R2_SECRET_ACCESS_KEY
          aws configure set region auto
          $NSIS = Get-ChildItem "apps/supaimg-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" | Select-Object -First 1
          $MSI = Get-ChildItem "apps/supaimg-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi" | Select-Object -First 1
          aws s3 cp $NSIS.FullName "s3://$env:R2_BUCKET/supaimg/$VERSION/supaimg_x64-setup.exe" --endpoint-url $R2_ENDPOINT
          aws s3 cp "$($NSIS.FullName).sig" "s3://$env:R2_BUCKET/supaimg/$VERSION/supaimg_x64-setup.exe.sig" --endpoint-url $R2_ENDPOINT
          aws s3 cp $MSI.FullName "s3://$env:R2_BUCKET/supaimg/$VERSION/supaimg_x64.msi" --endpoint-url $R2_ENDPOINT

  publish-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true

      - name: Generate combined update.json
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          VERSION="${{ github.ref_name }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
          aws configure set region auto

          MACOS_SIG=$(aws s3 cp "s3://${R2_BUCKET}/supaimg/${VERSION}/supaimg_aarch64.app.tar.gz.sig" - --endpoint-url "$R2_ENDPOINT")
          WINDOWS_SIG=$(aws s3 cp "s3://${R2_BUCKET}/supaimg/${VERSION}/supaimg_x64-setup.exe.sig" - --endpoint-url "$R2_ENDPOINT")

          cat > update.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Release ${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MACOS_SIG}",
                "url": "${R2_PUBLIC_URL}/supaimg/${VERSION}/supaimg_aarch64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "${R2_PUBLIC_URL}/supaimg/${VERSION}/supaimg_x64-setup.exe"
              }
            }
          }
          EOF
          aws s3 cp update.json "s3://${R2_BUCKET}/supaimg/update.json" --endpoint-url "$R2_ENDPOINT"

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false --repo ${{ github.repository }}
