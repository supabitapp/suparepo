name: Deploy supacode.sh (Workers)
on:
  push:
    branches:
      - main
    paths:
      - apps/supacode.sh/**
      - packages/ui/**
      - packages/typescript-config/**
      - bun.lock
      - package.json
      - turbo.json
      - .github/workflows/pages-supacode-app.yml
  pull_request:
    branches:
      - main
    paths:
      - apps/supacode.sh/**
      - packages/ui/**
      - packages/typescript-config/**
      - bun.lock
      - package.json
      - turbo.json
      - .github/workflows/pages-supacode-app.yml
concurrency:
  group: pages-supacode-app-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/turbo
            .turbo
            apps/**/.next/cache
            apps/**/node_modules/.vite
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-turbo-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-
      - run: bun install --frozen-lockfile
      - run: bun run deploy
        working-directory: apps/supacode.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
