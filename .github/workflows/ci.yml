name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            command: bun run lint
          - name: Format
            command: bun run fmt:check
          - name: Types
            command: bun run check-types
          - name: Build
            command: bun run build
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/turbo
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-turbo-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-
      - run: bun install --frozen-lockfile
      - run: ${{ matrix.command }}
