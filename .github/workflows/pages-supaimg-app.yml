name: Deploy supaimg.app (Pages)
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - apps/supaimg.app/**
      - packages/ui/**
      - packages/typescript-config/**
      - bun.lock
      - package.json
      - turbo.json
      - .github/workflows/pages-supaimg-app.yml
concurrency:
  group: pages-supaimg-app-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/turbo
            .turbo
            apps/**/node_modules/.vite
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-turbo-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-
      - run: bun install --frozen-lockfile
      - run: bun run supaimg.app:build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/supaimg.app/dist --project-name=supaimg
