name: supaimg-ci
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-fe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: cd apps/supaimg-desktop && bun run test

  check-rust:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      RUN_RMBG_TESTS: "1"
      RUN_TEXT_BLUR_TESTS: "1"
      ORT_DYLIB_PATH: ${{ github.workspace }}/apps/supaimg-desktop/src-tauri/models/onnxruntime-ci/libonnxruntime.so.1.22.0
      RMBG_MODEL_PATH: ${{ github.workspace }}/apps/supaimg-desktop/src-tauri/models/onnx/model_quantized.onnx
      TEXT_BLUR_MODEL_PATH: ${{ github.workspace }}/apps/supaimg-desktop/src-tauri/models/onnx/pp-ocrv5-server-det.onnx
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev nasm pkg-config libjpeg-dev libpng-dev
          version: 1.0
      - uses: actions/cache@v4
        with:
          path: apps/supaimg-desktop/src-tauri/models
          key: models-${{ runner.os }}-v3
      - run: |
          mkdir -p apps/supaimg-desktop/src-tauri/models/onnx
          if [ ! -f apps/supaimg-desktop/src-tauri/models/onnx/model_quantized.onnx ]; then
            curl -L -o apps/supaimg-desktop/src-tauri/models/onnx/model_quantized.onnx https://appcast.supaimg.app/supaimg/assets/onnx/model_quantized.onnx
          fi
          if [ ! -f apps/supaimg-desktop/src-tauri/models/onnx/pp-ocrv5-server-det.onnx ]; then
            curl -L -o apps/supaimg-desktop/src-tauri/models/onnx/pp-ocrv5-server-det.onnx https://appcast.supaimg.app/supaimg/assets/onnx/pp-ocrv5-server-det/det.onnx
          fi
          mkdir -p apps/supaimg-desktop/src-tauri/models/onnxruntime-ci
          if [ ! -f apps/supaimg-desktop/src-tauri/models/onnxruntime-ci/libonnxruntime.so.1.22.0 ]; then
            curl -L -o /tmp/onnxruntime-linux-x64-1.22.0.tgz https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-linux-x64-1.22.0.tgz
            tar -xzf /tmp/onnxruntime-linux-x64-1.22.0.tgz \
              --strip-components=2 \
              -C apps/supaimg-desktop/src-tauri/models/onnxruntime-ci \
              onnxruntime-linux-x64-1.22.0/lib/libonnxruntime.so.1.22.0
          fi
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7
      - uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a
      - run: cargo test --manifest-path apps/supaimg-desktop/src-tauri/Cargo.toml
